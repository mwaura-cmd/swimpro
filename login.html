<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwimPro - Login & Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --dark-bg: #0f1419;
            --darker-bg: #0a0f14;
            --card-bg: #1a232f;
            --border-color: #2a3f5f;
            --text-primary: #e1e8f0;
            --text-secondary: #a0afc0;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-purple: #8b5cf6;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--darker-bg) 0%, #1a1f2e 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
        }

        .auth-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .logo i {
            color: var(--accent-blue);
            margin-right: 8px;
        }

        .auth-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .auth-subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .auth-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Google sign-in UI removed */

        /* Google sign-in UI removed */

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .divider-text {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 600;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .form-input {
            padding: 10px 14px;
            background: var(--dark-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: inherit;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
        }

        .form-input::placeholder {
            color: var(--text-secondary);
        }

        .submit-btn {
            padding: 12px 16px;
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 44px;
        }

        .submit-btn:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn.loading {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .user-type-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .user-type-btn {
            padding: 12px 16px;
            background: transparent;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .user-type-btn:hover {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        .user-type-btn.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }

        .auth-switch {
            text-align: center;
            margin-top: 20px;
        }

        .auth-switch-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .auth-switch-link {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.3s;
        }

        .auth-switch-link:hover {
            color: #2563eb;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            display: none;
            gap: 8px;
            align-items: flex-start;
        }

        .error-message.show {
            display: flex;
        }

        .success-message {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #86efac;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            display: none;
            gap: 8px;
            align-items: flex-start;
        }

        .success-message.show {
            display: flex;
        }

        .checkbox-group {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 16px;
        }

        .checkbox-input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--accent-blue);
        }

        .checkbox-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .checkbox-label a {
            color: var(--accent-blue);
            text-decoration: none;
        }

        .checkbox-label a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .auth-card {
                padding: 24px;
            }

            .auth-title {
                font-size: 1.3rem;
            }

            .user-type-selector {
                gap: 8px;
            }

            .form-input {
                padding: 10px 12px;
                font-size: 16px; /* Prevents zoom on iOS */
            }

            .submit-btn {
                font-size: 0.9rem;
            }
        }

        /* Google sign-in UI removed */

        /* Google sign-in CSS removed */
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- Login Form -->
        <div id="loginForm" class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <i class="fas fa-water"></i>SwimPro
                </div>
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Sign in to your SwimPro account</p>
            </div>

            <div class="auth-content">
                <div class="error-message" id="loginError">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="loginErrorText"></span>
                </div>

                <div class="user-type-selector">
                    <button class="user-type-btn active" data-type="student" onclick="selectUserType(event, 'student', 'login')">
                        <i class="fas fa-graduation-cap"></i> Student
                    </button>
                    <button class="user-type-btn" data-type="admin" onclick="selectUserType(event, 'admin', 'login')">
                        <i class="fas fa-lock"></i> Admin
                    </button>
                </div>

                <!-- Google sign-in removed per request -->

                <div class="divider">
                    <div class="divider-line"></div>
                    <div class="divider-text">OR</div>
                    <div class="divider-line"></div>
                </div>

                <form id="emailLoginForm" onsubmit="loginWithEmail(event)">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" placeholder="you@example.com" required class="form-input">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" placeholder="********" autocomplete="current-password" required class="form-input">
                    </div>

                    <button type="submit" class="submit-btn">
                        <i class="fas fa-sign-in-alt"></i> Sign In
                    </button>
                </form>

                <div class="auth-switch">
                    <span class="auth-switch-text">Don't have an account? </span>
                    <a class="auth-switch-link" onclick="switchToSignUp()">Sign up</a>
                </div>
            </div>
        </div>

        <!-- Sign Up Form -->
        <div id="signupForm" class="auth-card" style="display: none;">
            <div class="auth-header">
                <div class="logo">
                    <i class="fas fa-water"></i>SwimPro
                </div>
                <h1 class="auth-title">Create Account</h1>
                <p class="auth-subtitle">Join SwimPro and start your swimming journey</p>
            </div>

            <div class="auth-content">
                <div class="error-message" id="signupError">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="signupErrorText"></span>
                </div>

                <div class="success-message" id="signupSuccess">
                    <i class="fas fa-check-circle"></i>
                    <span id="signupSuccessText"></span>
                </div>

                <div class="user-type-selector">
                    <button class="user-type-btn active" data-type="student" onclick="selectUserType(event, 'student', 'signup')">
                        <i class="fas fa-graduation-cap"></i> Student
                    </button>
                    <button class="user-type-btn" data-type="admin" onclick="selectUserType(event, 'admin', 'signup')">
                        <i class="fas fa-lock"></i> Admin
                    </button>
                </div>

                <!-- Google sign-up removed per request -->

                <div class="divider">
                    <div class="divider-line"></div>
                    <div class="divider-text">OR</div>
                    <div class="divider-line"></div>
                </div>

                <form id="emailSignupForm" onsubmit="signupWithEmail(event)">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" placeholder="John Kipchoge" required class="form-input">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" placeholder="you@example.com" required class="form-input">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" placeholder="********" autocomplete="new-password" required class="form-input">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" placeholder="********" autocomplete="new-password" required class="form-input">
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="termsCheckbox" required class="checkbox-input">
                        <label for="termsCheckbox" class="checkbox-label">
                            I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                        </label>
                    </div>

                    <button type="submit" class="submit-btn" style="margin-top: 20px;">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                </form>

                <div class="auth-switch">
                    <span class="auth-switch-text">Already have an account? </span>
                    <a class="auth-switch-link" onclick="switchToLogin()">Sign in</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== SUPABASE CONFIGURATION =====
        const SUPABASE_URL = 'https://rvpgoyufmegaqxvlwddi.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ2cGdveXVmbWVnYXF4dmx3ZGRpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTQ4MjQsImV4cCI6MjA5MDQzMDgyNH0.xM0Xqvy9aX7JFyueg6duGGbsrocf2qgtfvngciYM4nE';
        
        // Use a singleton client to avoid multiple GoTrue client instances.
        function getSupabase() {
            if (!window.swimproSupabaseClient && window.supabase) {
                window.swimproSupabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
            return window.swimproSupabaseClient;
        }

        async function ensureProfile(supabaseClient, user, preferredType = 'student') {
            const { data: existingProfile, error: existingError } = await supabaseClient
                .from('profiles')
                .select('*')
                .eq('id', user.id)
                .maybeSingle();

            if (existingError) {
                throw new Error('Could not fetch user profile');
            }

            if (existingProfile) {
                return existingProfile;
            }

            const email = (user.email || '').toLowerCase();
            const isAdminEmail = email === ADMIN_EMAIL.toLowerCase();
            const userType = isAdminEmail ? 'admin' : preferredType;
            const name = user.user_metadata?.name || email.split('@')[0] || 'SwimPro User';

            const { data: newProfile, error: insertError } = await supabaseClient
                .from('profiles')
                .insert([
                    {
                        id: user.id,
                        email,
                        name,
                        user_type: userType,
                        created_at: new Date().toISOString(),
                        updated_at: new Date().toISOString()
                    }
                ])
                .select('*')
                .single();

            if (insertError) {
                throw new Error('Could not create user profile');
            }

            return newProfile;
        }

        // ===== ADMIN CONFIGURATION =====
        const ADMIN_EMAIL = 'denismwaura548@gmail.com'; // Only email allowed for admin login

        let selectedUserType = {
            login: 'student',
            signup: 'student'
        };

        function selectUserType(evt, type, form) {
            selectedUserType[form] = type;
            const formId = form === 'login' ? 'loginForm' : 'signupForm';
            document.querySelectorAll(`#${formId} .user-type-btn`).forEach(btn => {
                btn.classList.remove('active');
            });
            const targetBtn = evt && evt.target ? evt.target.closest('.user-type-btn') : null;
            if (targetBtn) {
                targetBtn.classList.add('active');
            }
        }

        function switchToSignUp() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('signupForm').style.display = 'block';
        }

        function switchToLogin() {
            document.getElementById('signupForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        }

        function showError(message, form) {
            const errorEl = document.getElementById(`${form}Error`);
            const errorText = document.getElementById(`${form}ErrorText`);
            errorText.textContent = message;
            errorEl.classList.add('show');
        }

        function hideError(form) {
            document.getElementById(`${form}Error`).classList.remove('show');
        }

        function showSuccess(message, form) {
            const successEl = document.getElementById(`${form}Success`);
            const successText = document.getElementById(`${form}SuccessText`);
            successText.textContent = message;
            successEl.classList.add('show');
        }

        function hideSuccess(form) {
            document.getElementById(`${form}Success`).classList.remove('show');
        }

        // ===== SIGNUP COOLDOWN MANAGEMENT =====
        // Global interval tracker to prevent multiple simultaneous intervals
        let signupCooldownInterval = null;

        function startSignupCooldown(seconds) {
            const form = document.getElementById('emailSignupForm');
            if (!form) return;
            
            const btn = form.querySelector('button[type="submit"]');
            if (!btn) return;
            
            // Clear any existing interval first
            if (signupCooldownInterval !== null) {
                clearInterval(signupCooldownInterval);
                signupCooldownInterval = null;
            }
            
            // Store original button text
            const orig = btn.dataset.origText || btn.textContent;
            btn.dataset.origText = orig;
            btn.disabled = true;
            
            // Calculate end time
            let remaining = Math.max(1, Math.floor(seconds));
            btn.textContent = `Try again (${remaining}s)`;
            const endAt = Date.now() + remaining * 1000;
            
            // Store in sessionStorage
            sessionStorage.setItem('signupCooldownUntil', String(endAt));
            
            // Create new interval
            signupCooldownInterval = setInterval(() => {
                const now = Date.now();
                const rem = Math.ceil((endAt - now) / 1000);
                
                if (rem <= 0) {
                    // Timer expired - cleanup
                    clearInterval(signupCooldownInterval);
                    signupCooldownInterval = null;
                    btn.disabled = false;
                    btn.textContent = btn.dataset.origText || orig;
                    sessionStorage.removeItem('signupCooldownUntil');
                    return;
                }
                
                // Update button text
                btn.textContent = `Try again (${rem}s)`;
            }, 500); // Update every 500ms for smoother countdown
        }

        function restoreSignupCooldownIfAny() {
            const until = sessionStorage.getItem('signupCooldownUntil');
            if (!until) return;
            
            const endAt = Number(until);
            const now = Date.now();
            const rem = Math.ceil((endAt - now) / 1000);
            
            if (rem > 0) {
                // Cooldown still valid, restore it
                startSignupCooldown(rem);
            } else {
                // Cooldown expired, clean up
                sessionStorage.removeItem('signupCooldownUntil');
            }
        }

        // Google OAuth sign-in removed (disabled UI and flow per request)

        async function loginWithEmail(event) {
            event.preventDefault();
            hideError('login');

            const form = event.target;
            const email = form.querySelector('input[type="email"]').value;
            const password = form.querySelector('input[type="password"]').value;
            const normalizedEmail = (email || '').toLowerCase();

            // Validation
            if (!email || !password) {
                showError('Please fill in all fields', 'login');
                return;
            }

            try {
                if (selectedUserType.login === 'admin') {
                    if (normalizedEmail !== ADMIN_EMAIL.toLowerCase()) {
                        showError(`Admin login is restricted to ${ADMIN_EMAIL}`, 'login');
                        return;
                    }

                    const adminResp = await fetch('/api/admin/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'same-origin',
                        body: JSON.stringify({ password })
                    });

                    const adminData = await adminResp.json().catch(() => ({}));
                    if (!adminResp.ok || !adminData.token) {
                        showError(adminData.error || 'Admin login failed', 'login');
                        console.error('Admin login error:', adminData);
                        return;
                    }

                    localStorage.setItem('adminToken', adminData.token);
                    localStorage.setItem('swimproUser', JSON.stringify({
                        id: 'admin-local',
                        name: 'Admin',
                        email: normalizedEmail,
                        userType: 'admin',
                        loginMethod: 'email',
                        loginTime: new Date().toISOString()
                    }));

                    window.location.href = 'monitoring-dashboard.html';
                    return;
                }

                // Sign in via server to set httpOnly session cookie
                const resp = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({ email: normalizedEmail, password })
                });

                if (!resp.ok) {
                    const err = await resp.json().catch(() => ({}));
                    const detailed = err.details || {};
                    const message = err.error || detailed.error_description || detailed.error || 'Invalid email or password';
                    showError(message, 'login');
                    console.error('Auth login error:', err);
                    return;
                }

                // Server sets httpOnly cookie. Fetch minimal user info from server.
                const me = await fetch('/api/auth/me', { credentials: 'same-origin' });
                if (!me.ok) {
                    showError('Login failed: could not verify session', 'login');
                    return;
                }
                const { user } = await me.json();
                if (!user) {
                    showError('Login failed: no user returned', 'login');
                    return;
                }

                const sessionUser = {
                    id: user.id,
                    name: user.user_metadata?.name || (user.email && user.email.split('@')[0]) || 'User',
                    email: user.email,
                    userType: 'student',
                    loginMethod: 'email',
                    loginTime: new Date().toISOString()
                };

                // Store only non-sensitive user info in localStorage; token remains httpOnly on the cookie
                localStorage.setItem('swimproUser', JSON.stringify(sessionUser));
                localStorage.removeItem('adminToken');

                // Redirect
                window.location.href = 'student-dashboard.html';
            } catch (error) {
                showError('Login failed: ' + error.message, 'login');
                console.error('Login error:', error);
            }
        }

        async function signupWithEmail(event) {
            event.preventDefault();
            hideError('signup');
            hideSuccess('signup');
            
            const supabaseClient = getSupabase();
            if (!supabaseClient) {
                showError('Database connection initializing... please try again', 'signup');
                return;
            }

            const form = event.target;
            const name = form.querySelector('input[type="text"]').value;
            const email = form.querySelectorAll('input[type="email"]')[0].value;
            const password = form.querySelectorAll('input[type="password"]')[0].value;
            const confirmPassword = form.querySelectorAll('input[type="password"]')[1].value;
            const termsAccepted = document.getElementById('termsCheckbox').checked;

            // Validation
            if (!name || !email || !password || !confirmPassword) {
                showError('Please fill in all fields', 'signup');
                return;
            }

            if (password !== confirmPassword) {
                showError('Passwords do not match', 'signup');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters', 'signup');
                return;
            }

            if (!termsAccepted) {
                showError('Please accept the Terms of Service and Privacy Policy', 'signup');
                return;
            }

            try {
                if (selectedUserType.signup === 'admin' && email.toLowerCase() !== ADMIN_EMAIL.toLowerCase()) {
                    showError(`Admin signup is restricted to ${ADMIN_EMAIL}`, 'signup');
                    return;
                }
                // Sign up with Supabase Auth
                const { data: authData, error: signupError } = await supabaseClient.auth.signUp({
                    email: email.toLowerCase(),
                    password: password,
                    options: {
                        data: {
                            name: name,
                            user_type: selectedUserType.signup
                        }
                    }
                });

                if (signupError) {
                    const msg = (signupError.message || '').toLowerCase();
                    if (msg.includes('rate limit')) {
                        showError('Too many signup attempts. Wait a minute, then try again or use Login if this account already exists.', 'signup');
                        // Apply 60s cooldown on rate limit
                        startSignupCooldown(60);
                        return;
                    }

                    if (msg.includes('already') || msg.includes('registered')) {
                        showError('This email is already registered. Use Login instead.', 'signup');
                        // Apply 30s cooldown on any failure to prevent spam
                        startSignupCooldown(30);
                        return;
                    }

                    showError('Signup failed: ' + signupError.message, 'signup');
                    console.error('Auth signup error:', signupError);
                    // Apply 30s cooldown on any failure to prevent spam
                    startSignupCooldown(30);
                    return;
                }

                if (!authData.user) {
                    showError('Signup failed: No user created', 'signup');
                    return;
                }

                // If a session exists (email confirmation disabled), complete profile and redirect immediately.
                if (authData.session) {
                    const profile = await ensureProfile(supabaseClient, authData.user, selectedUserType.signup);

                    const sessionUser = {
                        id: authData.user.id,
                        name: profile.name,
                        email: authData.user.email,
                        userType: profile.user_type,
                        loginMethod: 'email',
                        loginTime: new Date().toISOString()
                    };

                    // Inform server to create httpOnly session cookie for this user
                    try {
                        await fetch('/api/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email: authData.user.email, password })
                        });
                    } catch (e) {
                        console.warn('Failed to set server session after signup:', e.message);
                    }

                    localStorage.setItem('swimproUser', JSON.stringify(sessionUser));
                    window.location.href = profile.user_type === 'admin' ? 'monitoring-dashboard.html' : 'student-dashboard.html';
                    return;
                }

                // Otherwise, user must confirm email first.
                showSuccess('Account created. Check your email for the confirmation link, then log in.', 'signup');
                const loginEmailInput = document.querySelector('#emailLoginForm input[type="email"]');
                if (loginEmailInput) {
                    loginEmailInput.value = email.toLowerCase();
                }
                setTimeout(() => {
                    switchToLogin();
                }, 1200);
            } catch (error) {
                showError('Signup failed: ' + error.message, 'signup');
                console.error('Signup error:', error);
            }
        }

        window.addEventListener('load', () => {
            // Initialize singleton client.
            getSupabase();
            // Restore signup cooldown if any
            restoreSignupCooldownIfAny();

            // OAuth redirect handling removed (Google sign-in disabled)

            // Check if user is already logged in
            const user = localStorage.getItem('swimproUser');
            if (user) {
                try {
                    const userData = JSON.parse(user);
                    if (userData.userType === 'admin') {
                        if (localStorage.getItem('adminToken')) {
                            window.location.href = 'monitoring-dashboard.html';
                        } else {
                            localStorage.removeItem('swimproUser');
                        }
                    } else {
                        window.location.href = 'student-dashboard.html';
                    }
                } catch (e) {
                    localStorage.removeItem('swimproUser');
                }
            }
        });
    </script>
</body>
</html>
